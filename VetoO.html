<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYC VETO - Agent Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --accent: #10b981;
            --bg-main: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-main); overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; z-index: 100; transition: 0.3s; }
        .logo-area { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: 900; color: var(--accent); border-bottom: 1px solid #1e293b; letter-spacing: 2px; }
        
        .profile-mini { padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; cursor: pointer; }
        .profile-mini:hover { background: #1e293b; }
        .profile-mini img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); padding: 3px; margin-bottom: 10px; }
        
        .nav-menu { flex: 1; overflow-y: auto; padding: 10px 0; }
        .level-btn { width: 100%; padding: 15px 25px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: 600; border-bottom: 1px solid #1e293b; transition: 0.2s; }
        .level-btn:hover { background: #1e293b; color: var(--accent); }
        
        .drawer { max-height: 0; overflow: hidden; background: #020617; transition: max-height 0.3s ease; }
        .sess-btn { width: 100%; padding: 12px 40px; background: none; border: none; color: #64748b; text-align: left; cursor: pointer; font-size: 0.85rem; }
        .sess-btn:hover { color: white; }

        /* Main Content */
        .main-stage { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }
        .breadcrumb { font-size: 0.8rem; color: #64748b; text-transform: uppercase; margin-bottom: 10px; }
        .activity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Activity Cards */
        .act-card { 
            padding: 25px 15px; border-radius: 12px; color: white; font-weight: 700; text-align: center; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .act-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .type-test { background: #dc2626; }    
        .type-study { background: #2563eb; }   
        .type-hw { background: #475569; }      
        .type-rec { background: #0891b2; }     
        .type-gp { background: #ca8a04; }      
        .type-special { background: #be123c; }

        /* FLASH CARD MODAL */
        #flashCardOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); z-index: 9999; display: none;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .flash-card {
            width: 95%; max-width: 900px; height: 90vh; background: #fff; border-radius: 25px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card-header { background: var(--sidebar-bg); color: white; padding: 30px; display: flex; align-items: center; gap: 25px; position: relative; }
        .card-header::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent); }
        
        .card-scroll-area { flex: 1; overflow-y: auto; padding: 30px; background: #f8fafc; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .info-box { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .info-box label { font-size: 0.65rem; color: #64748b; font-weight: 800; text-transform: uppercase; }
        .info-box div { font-size: 1rem; font-weight: 700; color: #0f172a; margin-top: 5px; }

        .levels-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px; margin-bottom: 30px; }
        .level-card { min-width: 75px; background: white; padding: 15px 10px; border-radius: 15px; text-align: center; border: 2px solid #e2e8f0; }
        .level-card.complete { border-color: var(--accent); background: #f0fdf4; }

        .activity-section { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; }
        .act-row { display: grid; grid-template-columns: 1fr 100px 150px; padding: 12px; border-bottom: 1px solid #f1f5f9; align-items: center; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: var(--accent); height: 100%; transition: 1s ease-in-out; }

        .card-controls { padding: 20px 30px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .btn { padding: 12px 25px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-refresh { background: #f1f5f9; color: #475569; }
        .btn-close { background: #ef4444; color: white; }

        /* Activity Window Overlay */
        #activityOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #activityWindow { width: 90%; height: 80%; background: white; border-radius: 20px; overflow: hidden; }

        /* Login */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #0f172a; padding: 40px; border-radius: 24px; border: 1px solid var(--accent); width: 360px; text-align: center; }
        .login-input { width: 100%; padding: 14px; margin: 10px 0; background: #020617; border: 1px solid #1e293b; border-radius: 12px; color: white; text-align: center; outline: none; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: white; letter-spacing: 2px;">VETO LOGIN</h2>
            <input type="email" id="loginEmail" class="login-input" placeholder="AGENT EMAIL">
            <input type="text" id="loginCode" class="login-input" placeholder="ACCESS CODE">
            <button onclick="attemptLogin()" id="loginBtn" style="width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 12px; color: #000; font-weight: 900; cursor: pointer; margin-top: 10px;">AUTHORIZE ACCESS</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo-area">VETO SYSTEM</div>
        <div class="profile-mini" onclick="openFlashCard()">
            <img id="sideAvatar" src="">
            <div id="sideName" style="font-weight: 700;">Agent Name</div>
            <div style="font-size: 0.7rem; color: var(--accent);">MY FLASH CARD</div>
        </div>
        
        <div class="nav-menu" id="levelMenu">
            </div>

        <button onclick="logout()" style="padding: 20px; background: #dc2626; color: white; border: none; font-weight: 700; cursor: pointer;">
            <i class="fas fa-power-off"></i> LOGOUT
        </button>
    </aside>

    <main class="main-stage">
        <div id="path" class="breadcrumb">Select Level & Session</div>
        <h1 id="sessionTitle">Dashboard</h1>
        <div class="activity-grid" id="activityGrid"></div>
    </main>

    <div id="activityOverlay">
        <div id="activityWindow">
            <iframe id="activityFrame" src="" frameborder="0" style="width:100%; height:100%;"></iframe>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 20px;">
            <button class="btn btn-close" onclick="closeActivity()">CLOSE WINDOW</button>
        </div>
    </div>

    <div id="flashCardOverlay">
        <div class="flash-card">
            <div class="card-header">
                <img id="cardAvatar" src="" style="width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--accent); background: white;">
                <div class="header-info">
                    <h2 id="cardName">--</h2>
                    <div id="cardEmail" style="opacity: 0.7; font-size: 0.9rem;">--</div>
                    <div style="margin-top: 12px; display: flex; gap: 20px;">
                        <span style="background: rgba(16,185,129,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; color: var(--accent); font-weight: 800;">CODE: <span id="cardCode">--</span></span>
                        <span style="background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800;">OFFLINE: <span id="cardOffline">--</span></span>
                    </div>
                </div>
            </div>

            <div class="card-scroll-area">
                <div class="info-grid">
                    <div class="info-box"><label>Group</label><div id="cardGroup">--</div></div>
                    <div class="info-box"><label>Age</label><div id="cardAge">--</div></div>
                    <div class="info-box"><label>Program</label><div id="cardProgram">--</div></div>
                    <div class="info-box"><label>Tokens</label><div id="cardTokens">0</div></div>
                    <div class="info-box"><label>Global Rank</label><div id="cardGRank">#0</div></div>
                    <div class="info-box"><label>Local Rank</label><div id="cardLRank">#0</div></div>
                </div>

                <h3 style="color: #1e293b; margin-bottom: 15px;"><i class="fas fa-layer-group"></i> Mastery Levels</h3>
                <div class="levels-container" id="levelsRow"></div>

                <h3 style="color: #1e293b; margin-bottom: 15px;"><i class="fas fa-chart-line"></i> Activity Performance</h3>
                <div class="activity-section" id="activitiesList"></div>
            </div>

            <div class="card-controls">
                <button class="btn btn-refresh" onclick="refreshCard()"><i class="fas fa-sync-alt"></i> REFRESH DATA</button>
                <button class="btn btn-close" onclick="closeFlashCard()"><i class="fas fa-times"></i> CLOSE CARD</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBNlaV0EgWQbwGTMXqroAz4aNhl_erXdRkLJezKoZ9jmjFWapgdb4dFX1QrRjpznROsg/exec";
        
        const syllabus = {
            1: { 1: ["H W", "Lis 1 test", "Gr 1 test"], 2: ["H W", "Gr 2 test", "Lis 2 test", "Vocab 1 study"], 3: ["H W", "Gr 3 test", "Lis 3 test", "Vocab 2 study"], 4: ["H W", "Gr 4 test", "Lis 4 test", "Reading 1 Rec"] },
            2: { 1: ["H W"], 2: ["Lis 5 test", "Gr 5 test", "Reading 2 Rec", "One Shot 1 study"], 3: ["H W", "Lis 6 test", "Reading 3 Rec", "Vocab 3 study"], 4: ["H W", "Lis 7 test", "Reading 4 Rec", "Vocab 4 study", "One Shot 2 study", "Lis 8 test", "Reading 5 Rec", "Gr 6 test", "Tongue Twister 1 Rec"] },
            3: { 1: ["H W"], 2: ["H W", "Lis 9 test", "Reading 6 Rec", "Tongue Twister 2 Rec", "One Shot 3 study"], 3: ["H W", "Lis 10 test", "Reading 7 Rec", "Tongue Twister 3 Rec", "Vocab 5 study"], 4: ["H W", "Lis 11 test", "Reading 8 Rec", "Tongue Twister 4 Rec", "Vocab 6 study", "One Shot 4 study", "H W", "Lis 12 test", "Reading 9 Rec", "Tongue Twister 5 Rec", "Gr 8 test", "Squeezer 1 study"] },
            4: { 1: ["H W"], 2: ["H W", "Lis 13 test", "Gr 9 test", "Reading 10 Rec", "Tongue Twister 6 Rec", "Squeezer 2 study", "One Shot 5 study"], 3: ["H W", "Lis 14 test", "Reading 11 Rec", "Tongue Twister 7 Rec", "Vocab 7 study"], 4: ["H W", "Lis 15 test", "Reading 12 Rec", "Tongue Twister 8 Rec", "Vocab 8 study", "One Shot 6 study", "H W", "Lis 16 test", "Reading 13 Rec", "Tongue Twister 9 Rec", "Gr 10 test", "DMT 1 study"] },
            5: { 1: ["H W"], 2: ["H W", "Lis 17 test", "Gr 11 test", "Reading 14 Rec", "Tongue Twister 10 Rec", "DMT 2 study", "One Shot 7 study"], 3: ["H W", "Lis 18 test", "Reading 15 Rec", "Tongue Twister 11 Rec", "Vocab 9 study"], 4: ["H W", "Lis 19 test", "Reading 16 Rec", "Tongue Twister 12 Rec", "Vocab 10 study", "One Shot 8 study", "H W", "Lis 20 test", "Reading 17 Rec", "Tongue Twister 13 Rec", "Gr 12 test", "job interview role play"] },
            6: { 1: ["H W"], 2: ["H W", "Lis 21 test", "Gr 13 test", "Reading 18 Rec", "Tongue Twister 14 Rec", "DMT 3 study", "One Shot 9 study"], 3: ["H W", "Lis 22 test", "Reading 19 Rec", "Tongue Twister 15 Rec", "Vocab 11 study"], 4: ["H W", "Lis 23 test", "Reading 20 Rec", "Tongue Twister 16 Rec", "Vocab 12 study", "One Shot 10 study", "H W", "Lis 24 test", "Reading 21 Rec", "Tongue Twister 17 Rec", "Gr 14 test", "Wish 1 study"] },
            7: { 1: ["H W"], 2: ["H W", "Lis 25 test", "Gr 15 test", "Reading 22 Rec", "Tongue Twister 18 Rec", "Squeezer 3 study", "One Shot 11 study"], 3: ["H W", "Lis 26 test", "Reading 23 Rec", "Tongue Twister 19 Rec", "Vocab 13 study"], 4: ["H W", "Lis 27 test", "Reading 24 Rec", "Tongue Twister 20 Rec", "Vocab 14 study", "One Shot 12 study", "H W", "Lis 28 test", "Reading 25 Rec", "Tongue Twister 21 Rec", "Gr 16 test", "Wish 2 study"] },
            8: { 1: ["H W"], 2: ["H W", "Lis 29 test", "Gr 17 test", "Reading 26 Rec", "Tongue Twister 22 Rec", "Squeezer 4 study", "One Shot 13 study"], 3: ["H W", "Lis 30 test", "Reading 27 Rec", "Tongue Twister 23 Rec", "Vocab 15 study"], 4: ["H W", "Lis 31 test", "Reading 28 Rec", "Tongue Twister 24 Rec", "Vocab 16 study", "One Shot 14 study", "H W", "Lis 32 test", "Reading 29 Rec", "Tongue Twister 25 Rec", "Gr 18 test", "Project 1 study"] },
            9: { 1: ["H W"], 2: ["H W", "Lis 33 test", "Gr 19 test", "Reading 30 Rec", "Tongue Twister 26 Rec", "Squeezer 5 study", "One Shot 15 study"], 3: ["H W", "Lis 34 test", "Reading 31 Rec", "Tongue Twister 27 Rec", "Vocab 17 study"], 4: ["H W", "Lis 35 test", "Reading 32 Rec", "Tongue Twister 28 Rec", "Vocab 18 study", "One Shot 16 study", "H W", "Lis 36 test", "Reading 33 Rec", "Tongue Twister 29 Rec", "Gr 20 test", "DMT 4 study"] },
            10: { 1: ["H W"], 2: ["H W", "Lis 37 test", "Reading 34 Rec", "Tongue Twister 30 Rec", "Wish 3 study"], 3: ["H W", "Lis 38 test", "Reading 35 Rec", "Tongue Twister 31 Rec", "Vocab 19 study"], 4: ["H W", "Lis 39 test", "Reading 36 Rec", "Tongue Twister 32 Rec", "Vocab 20 study", "One Shot 18 study", "H W", "Lis 40 test", "Reading 37 Rec", "Tongue Twister 33 Rec", "Project 2 study"] },
            11: { 1: ["H W"], 2: ["gp study", "H W", "Lis 41 test", "gp study", "Reading 38 Rec", "Tongue Twister 34 Rec", "Wish 3 study"], 3: ["H W", "Lis 42 test", "Reading 39 Rec", "Tongue Twister 35 Rec", "dmt 5 study"], 4: ["H W", "Lis 43 test", "Reading 40 Rec", "Tongue Twister 36 Rec", "Squeezer 6 study", "One Shot 20 study", "gp study", "H W", "gp study"] },
            12: { 1: ["H W", "gp study"], 2: ["H W"], 3: ["H W", "gp study", "gp sending"], 4: ["H W", "gp sending", "gp study"] }
        };

        let userProfile = null;

        function getActType(name) {
            const n = name.toLowerCase();
            if (n.includes('test')) return 'type-test';
            if (n.includes('study')) return 'type-study';
            if (n.includes('hw') || n.includes('h w')) return 'type-hw';
            if (n.includes('rec')) return 'type-rec';
            if (n.includes('gp')) return 'type-gp';
            return 'type-special';
        }

        async function attemptLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            if(!email || !code) return alert("Credentials required.");

            try {
                const res = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
                const data = await res.json();
                if(data.status === "success") {
                    userProfile = data;
                    localStorage.setItem('veto_email', email);
                    localStorage.setItem('veto_code', code);
                    document.getElementById('loginOverlay').style.display = 'none';
                    buildSidebar();
                    initProfile();
                    openFlashCard();
                } else { alert("Error: " + data.message); }
            } catch (e) { alert("Server Error"); }
        }

        function buildSidebar() {
            const menu = document.getElementById('levelMenu');
            menu.innerHTML = "";
            for(let i=1; i<=12; i++) {
                menu.innerHTML += `
                    <button class="level-btn" onclick="toggleDrawer(${i})">LEVEL ${i}</button>
                    <div class="drawer" id="drawer-${i}">
                        <button class="sess-btn" onclick="loadSession(${i}, 1)">Session 1</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 2)">Session 2</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 3)">Session 3</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 4)">Session 4</button>
                    </div>`;
            }
        }

        function toggleDrawer(lvl) {
            const d = document.getElementById(`drawer-${lvl}`);
            const isOpen = d.style.maxHeight;
            document.querySelectorAll('.drawer').forEach(el => el.style.maxHeight = null);
            d.style.maxHeight = isOpen ? null : "200px";
        }

        function loadSession(lvl, sess) {
            document.getElementById('path').innerText = `Level ${lvl} > Session ${sess}`;
            document.getElementById('sessionTitle').innerText = `Level ${lvl} - Session ${sess}`;
            const grid = document.getElementById('activityGrid');
            const acts = syllabus[lvl] ? syllabus[lvl][sess] : [];
            grid.innerHTML = acts.map(a => `
                <div class="act-card ${getActType(a)}" onclick="launchActivity('${a}', ${lvl}, ${sess})">${a}</div>
            `).join('');
        }

        function launchActivity(name, lvl, sess) {
            const fileName = name.replace(/\s+/g, '_');
            const frame = document.getElementById('activityFrame');
            frame.src = `eycmainengine.html?activity=${fileName}&email=${userProfile.email}&lvl=${lvl}&sess=${sess}`;
            document.getElementById('activityOverlay').style.display = 'flex';
        }

        function closeActivity() {
            document.getElementById('activityOverlay').style.display = 'none';
            document.getElementById('activityFrame').src = "";
        }

        function initProfile() {
            document.getElementById('sideAvatar').src = userProfile.avatar;
            document.getElementById('sideName').innerText = userProfile.name;
        }

        function openFlashCard() {
            if(!userProfile) return;
            const u = userProfile;
            document.getElementById('cardAvatar').src = u.avatar;
            document.getElementById('cardName').innerText = u.name;
            document.getElementById('cardEmail').innerText = u.email;
            document.getElementById('cardCode').innerText = u.code;
            document.getElementById('cardOffline').innerText = u.offlineCode;
            document.getElementById('cardGroup').innerText = u.group;
            document.getElementById('cardAge').innerText = u.age;
            document.getElementById('cardProgram').innerText = u.program;
            document.getElementById('cardTokens').innerText = u.tokens;
            document.getElementById('cardGRank').innerText = "#" + u.gRank;
            document.getElementById('cardLRank').innerText = "#" + u.lRank;

            const lRow = document.getElementById('levelsRow');
            lRow.innerHTML = "";
            for(let i=1; i<=12; i++) {
                const s = u.levelsScores ? u.levelsScores[i] : 0;
                lRow.innerHTML += `<div class="level-card ${s > 0 ? 'complete' : ''}"><small>LVL ${i}</small><div>${s}%</div></div>`;
            }

            const acts = [
                {l: "Attendance", v: u.grades.attendance}, {l: "ICA", v: u.grades.ica},
                {l: "Listening", v: u.grades.listening}, {l: "Grammar", v: u.grades.grammar},
                {l: "Reading", v: u.grades.reading}, {l: "Tongue Twister", v: u.grades.tongue},
                {l: "One Shot", v: u.grades.oneshot}, {l: "Games", v: u.grades.games},
                {l: "Squeezer", v: u.grades.squeezer}, {l: "DMT", v: u.grades.dmt},
                {l: "Wish", v: u.grades.wish}, {l: "Project", v: u.grades.project},
                {l: "Graduation Project", v: u.grades.gradProject}
            ];
            document.getElementById('activitiesList').innerHTML = acts.map(a => `
                <div class="act-row">
                    <div class="act-name">${a.l}</div>
                    <div class="act-score">${a.v || 0}</div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(a.v, 100)}%"></div></div>
                </div>`).join('');
            document.getElementById('flashCardOverlay').style.display = 'flex';
        }

        function closeFlashCard() { document.getElementById('flashCardOverlay').style.display = 'none'; }

        async function refreshCard() {
            await attemptLogin();
        }

        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem('veto_email')) {
                document.getElementById('loginEmail').value = localStorage.getItem('veto_email');
                document.getElementById('loginCode').value = localStorage.getItem('veto_code');
                attemptLogin();
            }
        };
    </script>
</body>
</html>
