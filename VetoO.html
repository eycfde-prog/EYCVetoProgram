<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EYC VETO - Agent Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #0f172a;
            --accent: #10b981;
            --bg-main: #f1f5f9;
        }

        /* الأساسيات */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--bg-main); 
            overflow: hidden; 
        }

        /* السايد بار (تعديل للموبايل) */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            z-index: 1000; 
            transition: transform 0.3s ease;
        }

        /* الهيدر للموبايل فقط */
        .mobile-header {
            display: none;
            background: var(--sidebar-bg);
            color: white;
            padding: 15px;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0; width: 100%;
            z-index: 999;
            box-sizing: border-box;
        }

        .logo-area { padding: 30px; text-align: center; font-size: 1.5rem; font-weight: 900; color: var(--accent); border-bottom: 1px solid #1e293b; letter-spacing: 2px; }
        
        .profile-mini { padding: 20px; text-align: center; border-bottom: 1px solid #1e293b; cursor: pointer; }
        .profile-mini img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        
        .nav-menu { flex: 1; overflow-y: auto; }
        .level-btn { width: 100%; padding: 15px 20px; background: none; border: none; color: #94a3b8; text-align: left; cursor: pointer; border-bottom: 1px solid #1e293b; }
        
        .drawer { max-height: 0; overflow: hidden; background: #020617; transition: max-height 0.3s ease; }
        .sess-btn { width: 100%; padding: 12px 40px; background: none; border: none; color: #64748b; text-align: left; font-size: 0.9rem; }

        /* المحتوى الرئيسي */
        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 20px; 
            margin-top: 0;
            transition: 0.3s;
        }

        .activity-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        
        .act-card { 
            padding: 20px 10px; border-radius: 15px; color: white; font-weight: 700; text-align: center; 
            font-size: 0.85rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* المودال (Flash Card) تعديلات الموبايل */
        .flash-card {
            width: 100%; height: 100%; border-radius: 0; display: flex; flex-direction: column;
        }

        .card-header { padding: 20px; flex-wrap: wrap; gap: 15px; justify-content: center; text-align: center; }
        .card-header img { width: 80px !important; height: 80px !important; }

        .info-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .info-box { padding: 10px; }

        /* الأكتيفتي رو للموبايل */
        .act-row { grid-template-columns: 1fr 50px; gap: 5px; }
        .act-row .progress-bg { grid-column: span 2; margin-top: 5px; }

        /* Media Queries للموبايل */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
            
            .mobile-header { display: flex; }
            .main-stage { padding-top: 80px; }

            .flash-card { height: 100vh; max-height: 100vh; }
            .card-controls { padding: 15px; flex-direction: column; gap: 10px; }
            .btn { width: 100%; justify-content: center; }
            
            #activityWindow { width: 100%; height: 100%; border-radius: 0; }
        }

        /* أنواع الكروت */
        .type-test { background: linear-gradient(135deg, #f87171, #dc2626); }
        .type-study { background: linear-gradient(135deg, #60a5fa, #2563eb); }
        .type-hw { background: linear-gradient(135deg, #94a3b8, #475569); }
        .type-rec { background: linear-gradient(135deg, #22d3ee, #0891b2); }
        .type-gp { background: linear-gradient(135deg, #fbbf24, #ca8a04); }
        .type-special { background: linear-gradient(135deg, #fb7185, #be123c); }

        /* Login Overlay */
        .login-box { width: 90%; max-width: 360px; padding: 25px; }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div onclick="toggleSidebar()"><i class="fas fa-bars fa-lg"></i></div>
        <div style="font-weight: 900; color: var(--accent);">VETO SYSTEM</div>
        <div onclick="openFlashCard()"><i class="fas fa-user-circle fa-lg"></i></div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="logo-area">VETO SYSTEM</div>
        <div class="profile-mini" onclick="openFlashCard(); toggleSidebar();">
            <img id="sideAvatar" src="https://via.placeholder.com/80">
            <div id="sideName">Agent Name</div>
            <div style="font-size: 0.7rem; color: var(--accent);">VIEW PROFILE</div>
        </div>
        
        <div class="nav-menu" id="levelMenu"></div>

        <button onclick="logout()" style="padding: 20px; background: #dc2626; color: white; border: none; font-weight: 700;">
            <i class="fas fa-power-off"></i> LOGOUT
        </button>
    </aside>

    <main class="main-stage">
        <div id="path" class="breadcrumb">Welcome Agent</div>
        <h1 id="sessionTitle" style="font-size: 1.5rem; margin: 0;">Dashboard</h1>
        <div class="activity-grid" id="activityGrid">
            <div style="text-align: center; grid-column: 1/-1; color: #94a3b8; margin-top: 50px;">
                <i class="fas fa-arrow-left"></i> Select a Level to start
            </div>
        </div>
    </main>

    <div id="activityOverlay">
        <div id="activityWindow">
            <iframe id="activityFrame" src="" frameborder="0" style="width:100%; height:100%;"></iframe>
        </div>
        <button class="btn btn-close" onclick="closeActivity()" style="position: absolute; bottom: 10px;">CLOSE</button>
    </div>

    <div id="flashCardOverlay">
        <div class="flash-card">
            <div class="card-header">
                <img id="cardAvatar" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent);">
                <div class="header-info">
                    <h2 id="cardName" style="margin:0; font-size: 1.2rem;">--</h2>
                    <div id="cardEmail" style="font-size: 0.8rem; opacity: 0.8;">--</div>
                    <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
                        <span style="background:rgba(16,185,129,0.2); padding:3px 10px; border-radius:15px; font-size:0.7rem;">CODE: <b id="cardCode">--</b></span>
                        <span style="background:rgba(255,255,255,0.1); padding:3px 10px; border-radius:15px; font-size:0.7rem;">OFFLINE: <b id="cardOffline">--</b></span>
                    </div>
                </div>
            </div>

            <div class="card-scroll-area">
                <div class="info-grid">
                    <div class="info-box"><label>Group</label><div id="cardGroup">--</div></div>
                    <div class="info-box"><label>Age</label><div id="cardAge">--</div></div>
                    <div class="info-box"><label>Tokens</label><div id="cardTokens">0</div></div>
                    <div class="info-box"><label>G-Rank</label><div id="cardGRank">#0</div></div>
                </div>

                <h3 style="font-size: 1rem;"><i class="fas fa-layer-group"></i> Mastery</h3>
                <div class="levels-container" id="levelsRow"></div>

                <h3 style="font-size: 1rem;"><i class="fas fa-chart-line"></i> Grades</h3>
                <div class="activity-section" id="activitiesList"></div>
            </div>

            <div class="card-controls">
                <button class="btn btn-refresh" onclick="refreshCard()">REFRESH</button>
                <button class="btn btn-close" onclick="closeFlashCard()">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color: white;">VETO LOGIN</h2>
            <input type="email" id="loginEmail" class="login-input" placeholder="EMAIL">
            <input type="text" id="loginCode" class="login-input" placeholder="CODE">
            <button onclick="attemptLogin()" id="loginBtn" style="width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: 900;">ACCESS</button>
        </div>
    </div>

    <script>
        // دالة لفتح وقفل السايد بار في الموبايل
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // نفس الـ Syllabus والـ Script الخاص بك مع تعديل بسيط للـ Mobile
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyBNlaV0EgWQbwGTMXqroAz4aNhl_erXdRkLJezKoZ9jmjFWapgdb4dFX1QrRjpznROsg/exec";
        const syllabus = {
            1: { 1: ["H W", "Lis 1 test", "Gr 1 test"], 2: ["H W", "Gr 2 test", "Lis 2 test", "Vocab 1 study"], 3: ["H W", "Gr 3 test", "Lis 3 test", "Vocab 2 study"], 4: ["H W", "Gr 4 test", "Lis 4 test", "Reading 1 Rec"] },
            2: { 1: ["H W"], 2: ["Lis 5 test", "Gr 5 test", "Reading 2 Rec", "One Shot 1 study"], 3: ["H W", "Lis 6 test", "Reading 3 Rec", "Vocab 3 study"], 4: ["H W", "Lis 7 test", "Reading 4 Rec", "Vocab 4 study", "One Shot 2 study", "Lis 8 test", "Reading 5 Rec", "Gr 6 test", "Tongue Twister 1 Rec"] },
            3: { 1: ["H W"], 2: ["H W", "Lis 9 test", "Reading 6 Rec", "Tongue Twister 2 Rec", "One Shot 3 study"], 3: ["H W", "Lis 10 test", "Reading 7 Rec", "Tongue Twister 3 Rec", "Vocab 5 study"], 4: ["H W", "Lis 11 test", "Reading 8 Rec", "Tongue Twister 4 Rec", "Vocab 6 study", "One Shot 4 study", "H W", "Lis 12 test", "Reading 9 Rec", "Tongue Twister 5 Rec", "Gr 8 test", "Squeezer 1 study"] },
            4: { 1: ["H W"], 2: ["H W", "Lis 13 test", "Gr 9 test", "Reading 10 Rec", "Tongue Twister 6 Rec", "Squeezer 2 study", "One Shot 5 study"], 3: ["H W", "Lis 14 test", "Reading 11 Rec", "Tongue Twister 7 Rec", "Vocab 7 study"], 4: ["H W", "Lis 15 test", "Reading 12 Rec", "Tongue Twister 8 Rec", "Vocab 8 study", "One Shot 6 study", "H W", "Lis 16 test", "Reading 13 Rec", "Tongue Twister 9 Rec", "Gr 10 test", "DMT 1 study"] },
            5: { 1: ["H W"], 2: ["H W", "Lis 17 test", "Gr 11 test", "Reading 14 Rec", "Tongue Twister 10 Rec", "DMT 2 study", "One Shot 7 study"], 3: ["H W", "Lis 18 test", "Reading 15 Rec", "Tongue Twister 11 Rec", "Vocab 9 study"], 4: ["H W", "Lis 19 test", "Reading 16 Rec", "Tongue Twister 12 Rec", "Vocab 10 study", "One Shot 8 study", "H W", "Lis 20 test", "Reading 17 Rec", "Tongue Twister 13 Rec", "Gr 12 test", "job interview role play"] },
            6: { 1: ["H W"], 2: ["H W", "Lis 21 test", "Gr 13 test", "Reading 18 Rec", "Tongue Twister 14 Rec", "DMT 3 study", "One Shot 9 study"], 3: ["H W", "Lis 22 test", "Reading 19 Rec", "Tongue Twister 15 Rec", "Vocab 11 study"], 4: ["H W", "Lis 23 test", "Reading 20 Rec", "Tongue Twister 16 Rec", "Vocab 12 study", "One Shot 10 study", "H W", "Lis 24 test", "Reading 21 Rec", "Tongue Twister 17 Rec", "Gr 14 test", "Wish 1 study"] },
            7: { 1: ["H W"], 2: ["H W", "Lis 25 test", "Gr 15 test", "Reading 22 Rec", "Tongue Twister 18 Rec", "Squeezer 3 study", "One Shot 11 study"], 3: ["H W", "Lis 26 test", "Reading 23 Rec", "Tongue Twister 19 Rec", "Vocab 13 study"], 4: ["H W", "Lis 27 test", "Reading 24 Rec", "Tongue Twister 20 Rec", "Vocab 14 study", "One Shot 12 study", "H W", "Lis 28 test", "Reading 25 Rec", "Tongue Twister 21 Rec", "Gr 16 test", "Wish 2 study"] },
            8: { 1: ["H W"], 2: ["H W", "Lis 29 test", "Gr 17 test", "Reading 26 Rec", "Tongue Twister 22 Rec", "Squeezer 4 study", "One Shot 13 study"], 3: ["H W", "Lis 30 test", "Reading 27 Rec", "Tongue Twister 23 Rec", "Vocab 15 study"], 4: ["H W", "Lis 31 test", "Reading 28 Rec", "Tongue Twister 24 Rec", "Vocab 16 study", "One Shot 14 study", "H W", "Lis 32 test", "Reading 29 Rec", "Tongue Twister 25 Rec", "Gr 18 test", "Project 1 study"] },
            9: { 1: ["H W"], 2: ["H W", "Lis 33 test", "Gr 19 test", "Reading 30 Rec", "Tongue Twister 26 Rec", "Squeezer 5 study", "One Shot 15 study"], 3: ["H W", "Lis 34 test", "Reading 31 Rec", "Tongue Twister 27 Rec", "Vocab 17 study"], 4: ["H W", "Lis 35 test", "Reading 32 Rec", "Tongue Twister 28 Rec", "Vocab 18 study", "One Shot 16 study", "H W", "Lis 36 test", "Reading 33 Rec", "Tongue Twister 29 Rec", "Gr 20 test", "DMT 4 study"] },
            10: { 1: ["H W"], 2: ["H W", "Lis 37 test", "Reading 34 Rec", "Tongue Twister 30 Rec", "Wish 3 study"], 3: ["H W", "Lis 38 test", "Reading 35 Rec", "Tongue Twister 31 Rec", "Vocab 19 study"], 4: ["H W", "Lis 39 test", "Reading 36 Rec", "Tongue Twister 32 Rec", "Vocab 20 study", "One Shot 18 study", "H W", "Lis 40 test", "Reading 37 Rec", "Tongue Twister 33 Rec", "Project 2 study"] },
            11: { 1: ["H W"], 2: ["gp study", "H W", "Lis 41 test", "gp study", "Reading 38 Rec", "Tongue Twister 34 Rec", "Wish 3 study"], 3: ["H W", "Lis 42 test", "Reading 39 Rec", "Tongue Twister 35 Rec", "dmt 5 study"], 4: ["H W", "Lis 43 test", "Reading 40 Rec", "Tongue Twister 36 Rec", "Squeezer 6 study", "One Shot 20 study", "gp study", "H W", "gp study"] },
            12: { 1: ["H W", "gp study"], 2: ["H W"], 3: ["H W", "gp study", "gp sending"], 4: ["H W", "gp sending", "gp study"] }
        };

        let userProfile = null;

        function getActType(name) {
            const n = name.toLowerCase();
            if (n.includes('test')) return 'type-test';
            if (n.includes('study')) return 'type-study';
            if (n.includes('hw') || n.includes('h w')) return 'type-hw';
            if (n.includes('rec')) return 'type-rec';
            if (n.includes('gp')) return 'type-gp';
            return 'type-special';
        }

        async function attemptLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const code = document.getElementById('loginCode').value.trim();
            if(!email || !code) return;
            document.getElementById('loginBtn').innerText = "Authenticating...";

            try {
                const res = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(email)}&code=${encodeURIComponent(code)}`);
                const data = await res.json();
                if(data.status === "success") {
                    userProfile = data;
                    localStorage.setItem('veto_email', email);
                    localStorage.setItem('veto_code', code);
                    document.getElementById('loginOverlay').style.display = 'none';
                    buildSidebar();
                    initProfile();
                    openFlashCard();
                } else { alert(data.message); }
            } catch (e) { alert("Server Error"); }
            document.getElementById('loginBtn').innerText = "ACCESS";
        }

        function buildSidebar() {
            const menu = document.getElementById('levelMenu');
            menu.innerHTML = "";
            for(let i=1; i<=12; i++) {
                menu.innerHTML += `
                    <button class="level-btn" onclick="toggleDrawer(${i})">LEVEL ${i}</button>
                    <div class="drawer" id="drawer-${i}">
                        <button class="sess-btn" onclick="loadSession(${i}, 1)">Session 1</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 2)">Session 2</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 3)">Session 3</button>
                        <button class="sess-btn" onclick="loadSession(${i}, 4)">Session 4</button>
                    </div>`;
            }
        }

        function toggleDrawer(lvl) {
            const d = document.getElementById(`drawer-${lvl}`);
            const isOpen = d.style.maxHeight;
            document.querySelectorAll('.drawer').forEach(el => el.style.maxHeight = null);
            d.style.maxHeight = isOpen ? null : "200px";
        }

        function loadSession(lvl, sess) {
            if(window.innerWidth <= 768) toggleSidebar();
            document.getElementById('path').innerText = `Level ${lvl} > Session ${sess}`;
            document.getElementById('sessionTitle').innerText = `Level ${lvl} - Session ${sess}`;
            const grid = document.getElementById('activityGrid');
            const acts = syllabus[lvl][sess];
            grid.innerHTML = acts.map(a => `
                <div class="act-card ${getActType(a)}" onclick="launchActivity('${a}', ${lvl}, ${sess})">${a}</div>
            `).join('');
        }

        function launchActivity(name, lvl, sess) {
            const fileName = name.replace(/\s+/g, '_');
            document.getElementById('activityFrame').src = `eycmainengine.html?activity=${fileName}&email=${userProfile.email}&lvl=${lvl}&sess=${sess}`;
            document.getElementById('activityOverlay').style.display = 'flex';
        }

        function closeActivity() {
            document.getElementById('activityOverlay').style.display = 'none';
            document.getElementById('activityFrame').src = "";
        }

        function initProfile() {
            document.getElementById('sideAvatar').src = userProfile.avatar;
            document.getElementById('sideName').innerText = userProfile.name;
        }

        function openFlashCard() {
            const u = userProfile;
            if(!u) return;
            document.getElementById('cardAvatar').src = u.avatar;
            document.getElementById('cardName').innerText = u.name;
            document.getElementById('cardEmail').innerText = u.email;
            document.getElementById('cardCode').innerText = u.code;
            document.getElementById('cardOffline').innerText = u.offlineCode;
            document.getElementById('cardGroup').innerText = u.group;
            document.getElementById('cardAge').innerText = u.age;
            document.getElementById('cardTokens').innerText = u.tokens;
            document.getElementById('cardGRank').innerText = "#" + u.gRank;

            const lRow = document.getElementById('levelsRow');
            lRow.innerHTML = "";
            for(let i=1; i<=12; i++) {
                const s = u.levelsScores[i] || 0;
                lRow.innerHTML += `<div class="level-card ${s > 0 ? 'complete' : ''}"><small>L${i}</small><div>${s}%</div></div>`;
            }

            const acts = [
                {l: "Attendance", v: u.grades.attendance}, {l: "ICA", v: u.grades.ica},
                {l: "Listening", v: u.grades.listening}, {l: "Grammar", v: u.grades.grammar},
                {l: "Reading", v: u.grades.reading}, {l: "Tongue", v: u.grades.tongue}
            ];
            document.getElementById('activitiesList').innerHTML = acts.map(a => `
                <div class="act-row">
                    <div style="font-size:0.8rem; font-weight:bold;">${a.l}</div>
                    <div style="text-align:right; font-weight:900; color:var(--accent);">${a.v || 0}</div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${Math.min(a.v, 100)}%"></div></div>
                </div>`).join('');
            document.getElementById('flashCardOverlay').style.display = 'flex';
        }

        function closeFlashCard() { document.getElementById('flashCardOverlay').style.display = 'none'; }
        async function refreshCard() { await attemptLogin(); }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => {
            if(localStorage.getItem('veto_email')) {
                document.getElementById('loginEmail').value = localStorage.getItem('veto_email');
                document.getElementById('loginCode').value = localStorage.getItem('veto_code');
                attemptLogin();
            }
        };
    </script>
</body>
</html>
